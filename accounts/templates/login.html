{% extends 'base.html' %}

{% block content %}

<style>
body {
    background-image: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("https://wallpapercave.com/wp/wp9764014.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

.login-container {
    width: 400px;
    margin: 80px auto;
    padding: 40px 30px;
    border-radius: 30px;
    background: linear-gradient(135deg, #1aa7a1, #5b3f8c);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    color: #fff;
}

.login-container h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 32px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 16px;
}

.form-group input {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    outline: none;
    background: #ddd;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #4da8da, #3f8efc);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

.error {
    color: #ffcccc;
    text-align: center;
    margin-bottom: 15px;
}
</style>

<div class="login-container">
    <h2>Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

{% endblock %}
