{% extends 'base.html' %}

{% block content %}

<style>
/* 🌈 Background (UNCHANGED) */
body {
    background-image: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("https://img.freepik.com/premium-photo/gradient-ui-ux-elements-background_1165404-46282.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 40px;
}

.title {
    font-size: 38px;
    font-weight: bold;
    color: white;
}

.subtitle {
    color: #ddd;
    font-size: 15px;
}

/* PROJECT GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 20px;
    padding: 25px;
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px);
}

/* ICON */
.icon {
    font-size: 40px;
    margin-bottom: 10px;
}

/* TITLE */
.card h3 {
    margin-bottom: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 10px;
    background: #6366f1;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #4f46e5;
}

/* STATS */
.stats {
    margin-top: 60px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.stat-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

</style>

<div class="header">
    <h1 class="title">🚀 ML Projects Hub</h1>
    <p class="subtitle">Select a project to start prediction</p>
</div>



<div class="stats">

    <div class="stat-box">
        <p>Users</p>
        <h2>{{ total_users }}</h2>
    </div>

    <div class="stat-box">
        <p>Predictions</p>
        <h2>Live</h2>
    </div>

    <div class="stat-box">
        <p>Models</p>
        <h2>3+</h2>
    </div>

</div>

{% endblock %}
